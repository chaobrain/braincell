name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Verify release tag matches package version
        if: ${{ github.event_name == 'release' }}
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "Release tag: $TAG"
          PKG_VERSION=$(python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("braincell/_version.py").read_text(encoding="utf-8")
          match = re.search(r'^__version__\s*=\s*"([^"]+)"', text, re.MULTILINE)
          print(match.group(1) if match else "")
          PY
          )
          echo "Package version: ${PKG_VERSION}"
          TAG_STRIPPED=${TAG#v}
          if [[ -z "$PKG_VERSION" ]]; then
            echo "Could not determine package version from braincell/_version.py" >&2
            exit 1
          fi
          if [[ "$TAG_STRIPPED" != "$PKG_VERSION" ]]; then
            echo "Tag ($TAG) does not match package version ($PKG_VERSION)" >&2
            exit 1
          fi

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: python -m build

      - name: Store distribution packages
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Download distribution packages
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
